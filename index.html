<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>一品香烤肉 · 扫码优惠</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
            background: #f5f0eb;
            color: #2c2418;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding-bottom: 48px;
        }

        /* ===== Hero ===== */
        .hero {
            position: relative;
            width: 100%;
            background: linear-gradient(160deg, #3a1508 0%, #6a2a16 35%, #a04422 70%, #c75a30 100%);
            padding: 48px 20px 36px;
            text-align: center;
            overflow: hidden;
        }
        .hero::before {
            content: '🥩';
            position: absolute;
            top: 10px;
            left: 12px;
            font-size: 70px;
            opacity: 0.10;
            transform: rotate(-15deg);
        }
        .hero::after {
            content: '🔥';
            position: absolute;
            bottom: 40px;
            right: 12px;
            font-size: 60px;
            opacity: 0.10;
            transform: rotate(15deg);
        }
        .hero .fire-l {
            position: absolute;
            top: 30px;
            left: 40%;
            font-size: 28px;
            opacity: 0.08;
        }
        .hero .fire-r {
            position: absolute;
            bottom: 55px;
            right: 35%;
            font-size: 28px;
            opacity: 0.08;
        }
        .hero .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 28px;
            background: #f5f0eb;
            border-radius: 28px 28px 0 0;
        }
        .hero .brand-icon {
            font-size: 52px;
            display: block;
            margin-bottom: 8px;
            position: relative;
        }
        .hero .brand-name {
            color: #fff;
            font-size: 40px;
            font-weight: 800;
            letter-spacing: 6px;
            text-shadow: 0 4px 16px rgba(0,0,0,0.35);
            position: relative;
        }
        .hero .brand-name .en {
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 3px;
            opacity: 0.75;
            display: block;
            margin-top: 4px;
            font-style: italic;
        }
        .hero .brand-line {
            width: 60px;
            height: 3px;
            background: rgba(255,255,255,0.4);
            margin: 12px auto 10px;
            border-radius: 2px;
        }
        .hero .subtitle {
            color: rgba(255,255,255,0.85);
            font-size: 13px;
            margin-top: 8px;
            letter-spacing: 1px;
            position: relative;
        }
        .hero .subtitle span {
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 3px 14px;
            margin: 0 3px;
            font-size: 12px;
        }

        /* ===== Container ===== */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 16px;
        }

        /* ===== Section title ===== */
        .section-title {
            font-size: 18px;
            font-weight: 700;
            padding: 28px 0 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #4a1f0d;
        }
        .section-title .badge {
            font-size: 12px;
            font-weight: 500;
            background: #e8ddd4;
            color: #7a3420;
            padding: 2px 10px;
            border-radius: 12px;
        }

        /* ===== Tip Banner ===== */
        .tip {
            background: #fff;
            border: 1px solid #e8ddd4;
            border-radius: 12px;
            padding: 14px 16px;
            margin: -8px 0 8px;
            font-size: 13px;
            color: #5a4a3a;
            line-height: 1.7;
        }
        .tip strong {
            color: #b15131;
        }

        /* ===== Store Section ===== */
        .store-section {
            background: #fff;
            border-radius: 18px;
            margin-top: 16px;
            padding: 20px;
            box-shadow: 0 2px 16px rgba(74,31,13,0.08);
            border: 1px solid #ede6de;
        }
        .store-section .store-name {
            font-size: 20px;
            font-weight: 700;
            color: #4a1f0d;
        }
        .store-section .store-name .tag {
            font-size: 12px;
            font-weight: 500;
            background: #f5f0eb;
            color: #7a3420;
            padding: 2px 10px;
            border-radius: 10px;
            margin-left: 8px;
            vertical-align: middle;
        }
        .store-section .store-address {
            font-size: 14px;
            color: #8a7a6a;
            margin-top: 6px;
            line-height: 1.5;
        }
        .store-section .store-phone {
            font-size: 13px;
            color: #b15131;
            margin-top: 2px;
        }

        /* ===== QR Pair ===== */
        .qr-pair {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }
        .qr-item {
            background: #faf5f0;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #ede6de;
            text-align: center;
        }
        .qr-item .img-wrap {
            padding: 16px;
            background: #fff;
        }
        .qr-item img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }
        .qr-item .platform-label {
            padding: 10px 12px;
            font-size: 14px;
            font-weight: 600;
            border-top: 1px solid #ede6de;
        }
        .qr-item .platform-label.dianping {
            color: #e4393c;
            background: #fff8f5;
        }
        .qr-item .platform-label.douyin {
            color: #1a1a2e;
            background: #f8f9ff;
        }
        .qr-item .hint {
            font-size: 11px;
            color: #9a8a7a;
            padding: 0 12px 10px;
            border-top: 1px solid #f0ebe6;
        }

        /* ===== Footer ===== */
        .footer {
            text-align: center;
            padding: 32px 16px 16px;
            font-size: 12px;
            color: #b0a090;
        }
        .footer .heart {
            color: #b15131;
        }

        /* ===== Responsive ===== */
        @media (max-width: 400px) {
            .qr-pair {
                grid-template-columns: 1fr;
            }
            .store-section {
                padding: 16px;
            }
        }

        /* ===== Count Badge ===== */
        .count-badge {
            text-align: center;
            font-size: 13px;
            color: #8a7a6a;
            padding: 8px 0 4px;
        }
        .count-badge span {
            background: #e8ddd4;
            color: #7a3420;
            padding: 2px 12px;
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <!-- ========== Hero ========== -->
    <div class="hero">
        <span class="brand-icon">🥩</span>
        <div class="brand-name">
            一品香烤肉
            <span class="en">Yipinxiang BBQ</span>
        </div>
        <div class="brand-line"></div>
        <div class="subtitle">
            <span>🔥 炭火烤肉</span>
            <span>🥩 鲜切现烤</span>
            <span>🍻 聚餐首选</span>
        </div>
        <span class="fire-l">🔥</span>
        <span class="fire-r">🔥</span>
        <div class="wave"></div>
    </div>

    <div class="container">

        <!-- ========== Tip ========== -->
        <div class="tip">
            <strong>💡 使用说明：</strong>在微信中长按下方二维码图片，选择「识别图中二维码」即可领取对应平台优惠券。每个门店均有 <strong>大众点评</strong> 和 <strong>抖音</strong> 双平台优惠码。
        </div>

        <!-- ========== Store List ========== -->
        <div class="section-title">
            🏪 门店优惠码 <span class="badge">5家店</span>
        </div>

        <div id="storeList"></div>

        <!-- ========== Footer ========== -->
        <div class="footer">
            一品香烤肉 · <span class="heart">♥</span> 欢迎您的光临<br>
            长按识别二维码 · 领券更优惠
        </div>

    </div>

    <script>
        const stores = [
            { name: '夏湾创始店', address: '夏湾路 骏兴苑101号店铺', phone: '', img1: 'store1_dianping.jpg', img2: 'store1_douyin.png' },
            { name: '柠溪二店', address: '柠溪路 柠溪大厦271号店铺', phone: '(0756) 228 9586', img1: 'store2_dianping.jpg', img2: 'store2_douyin.png' },
            { name: '南屏三店', address: '南屏路 花街步行街 D6A店铺', phone: '(0756) 393 1549', img1: 'store3_dianping.jpg', img2: 'store3_douyin.png' },
            { name: '吉大四店', address: '景园路 金嘉创意园106号店铺', phone: '(0756) 617 6076', img1: 'store4_dianping.jpg', img2: 'store4_douyin.png' },
            { name: '坦洲五店', address: '南坦路 牡丹酒店旁141号店铺', phone: '(0760) 8698 5356', img1: 'store5_dianping.jpg', img2: 'store5_douyin.png' }
        ];

        const container = document.getElementById('storeList');

        stores.forEach((store, index) => {
            const section = document.createElement('div');
            section.className = 'store-section';
            const phoneHtml = store.phone ? `<div class="store-phone">📞 ${store.phone}</div>` : '';

            section.innerHTML = [
                `<div class="store-name">${index + 1}. ${store.name}</div>`,
                `<div class="store-address">📍 ${store.address}</div>`,
                phoneHtml,
                '<div class="qr-pair">',
                '  <div class="qr-item">',
                '    <div class="img-wrap">',
                `      <img src="${store.img1}" alt="${store.name} 大众点评" loading="lazy">`,
                '    </div>',
                '    <div class="platform-label dianping">⭐ 大众点评</div>',
                '    <div class="hint">长按识别 · 领券</div>',
                '  </div>',
                '  <div class="qr-item">',
                '    <div class="img-wrap">',
                `      <img src="${store.img2}" alt="${store.name} 抖音" loading="lazy">`,
                '    </div>',
                '    <div class="platform-label douyin">🎵 抖音</div>',
                '    <div class="hint">长按识别 · 领券</div>',
                '  </div>',
                '</div>'
            ].join('');
            container.appendChild(section);
        });
    </script>

</body>
</html>
